name: Test

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-check-test:
    name: Build, lint, typecheck, unit tests
    timeout-minutes: 15
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 20
          - os: ubuntu-latest
            node-version: 22
          - os: macos-latest
            node-version: 22
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: next-ui/package-lock.json

      - name: Install dependencies
        run: npm --prefix next-ui ci

      - name: Lint
        run: npm --prefix next-ui run lint

      - name: Typecheck
        run: npm --prefix next-ui run typecheck

      - name: Build
        run: npm --prefix next-ui run build

      - name: Unit tests
        run: npm --prefix next-ui run test

  e2e:
    name: E2E (Playwright)
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: next-ui/package-lock.json

      - name: Install dependencies
        run: npm --prefix next-ui ci

      - name: Install Playwright browser
        run: npm --prefix next-ui exec -- playwright install --with-deps chromium

      - name: E2E tests
        run: npm --prefix next-ui run test:e2e
        env:
          CI: "true"
